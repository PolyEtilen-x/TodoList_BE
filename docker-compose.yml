version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres-db:
    image: postgres:15-alpine
    container_name: todolist_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: todo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todolist_network
    restart: unless-stopped

  # 2. PGAdmin - Web interface for PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: todolist_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8088:80"
    depends_on:
      - postgres-db
    networks:
      - todolist_network
    restart: unless-stopped

  # 3. NestJS Backend API
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todolist_backend
    environment:
      # Automatically route DATABASE_URL to the postgres-db container
      DATABASE_URL: "postgresql://postgres:mysecretpassword@postgres-db:5432/todo_db?schema=public"
      PORT: 3000
    ports:
      - "3002:3000"
    depends_on:
      - postgres-db
    networks:
      - todolist_network
    restart: unless-stopped

networks:
  todolist_network:
    driver: bridge

volumes:
  postgres_data:
